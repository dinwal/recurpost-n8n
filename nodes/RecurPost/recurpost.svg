<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Yellow rounded square background -->
  <rect x="0" y="0" width="64" height="64" rx="10" ry="10" fill="#FCD34D"/>

  <!-- Clock with circular arrow -->
  <g fill="none" stroke="#292524" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Circular arrow (outer arc) -->
    <path d="M18 38 A18 18 0 1 1 46 38" />
    <!-- Arrow head -->
    <polyline points="12,32 18,38 24,32" fill="#292524" stroke="#292524"/>
    <!-- Clock circle -->
    <circle cx="32" cy="28" r="10" fill="#FCD34D"/>
    <!-- Clock hands -->
    <line x1="32" y1="28" x2="32" y2="22"/>
    <line x1="32" y1="28" x2="37" y2="28"/>
  </g>
</svg>
